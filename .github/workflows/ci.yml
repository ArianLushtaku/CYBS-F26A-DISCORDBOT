name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Syntax check
        run: |
          for f in main.py utils.py bot_commands.py bot_event.py calendar_func.py helper_functions.py pinned_message.py; do
            python -m py_compile "$f" && echo "OK: $f"
          done
      - name: Run tests
        run: python -m pytest tests/ -v
